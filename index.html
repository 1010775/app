<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケートボードゲーム（強化版）</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #ffffff);
    font-family: sans-serif;
  }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #333;
    font-size: 18px;
  }
</style>
</head>
<body>
<div id="ui">スコア: <span id="score">0</span></div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: 100,
  y: canvas.height - 150,
  width: 60,
  height: 20,
  vy: 0,
  gravity: 0.8,
  jump: -15,
  onGround: true
};

let obstacles = [];
let score = 0;
let gameOver = false;

function spawnObstacle() {
  const type = Math.random();

  if (type < 0.4) {
    // 高い壁
    obstacles.push({ x: canvas.width, y: canvas.height - 180, width: 30, height: 80, type: "rect" });
  } else if (type < 0.7) {
    // 低い障害物
    obstacles.push({ x: canvas.width, y: canvas.height - 120, width: 40, height: 20, type: "rect" });
  } else {
    // 三角（ジャンプしにくい）
    obstacles.push({ x: canvas.width, y: canvas.height - 100, width: 40, height: 40, type: "triangle" });
  }
}

setInterval(spawnObstacle, 1200);

function update() {
  if (gameOver) return;

  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y > canvas.height - 150) {
    player.y = canvas.height - 150;
    player.vy = 0;
    player.onGround = true;
  }

  obstacles.forEach(o => {
    o.x -= 7;

    // 当たり判定（簡易）
    if (
      player.x < o.x + o.width &&
      player.x + player.width > o.x &&
      player.y < o.y + o.height &&
      player.y + player.height > o.y
    ) {
      gameOver = true;
      alert("ゲームオーバー！ スコア: " + score);
      location.reload();
    }
  });

  obstacles = obstacles.filter(o => o.x > -50);

  score++;
  document.getElementById("score").textContent = score;
}

function drawPlayer() {
  // ボード
  ctx.fillStyle = "black";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // タイヤ
  ctx.fillStyle = "gray";
  ctx.beginPath();
  ctx.arc(player.x + 10, player.y + player.height + 5, 5, 0, Math.PI * 2);
  ctx.arc(player.x + player.width - 10, player.y + player.height + 5, 5, 0, Math.PI * 2);
  ctx.fill();

  // 人（シンプル）
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x + 20, player.y - 20, 20, 20);
}

function drawObstacles() {
  obstacles.forEach(o => {
    ctx.fillStyle = "red";
    if (o.type === "rect") {
      ctx.fillRect(o.x, o.y, o.width, o.height);
    } else {
      // 三角
      ctx.beginPath();
      ctx.moveTo(o.x, o.y + o.height);
      ctx.lineTo(o.x + o.width / 2, o.y);
      ctx.lineTo(o.x + o.width, o.y + o.height);
      ctx.closePath();
      ctx.fill();
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 地面
  ctx.fillStyle = "#654321";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  drawPlayer();
  drawObstacles();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

window.addEventListener("keydown", e => {
  if (e.code === "Space" && player.onGround) {
    player.vy = player.jump;
    player.onGround = false;
  }
});

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
