



 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛ゲーム</title>
<style>
body {
  font-family: sans-serif;
  background: linear-gradient(#ffd1dc, #fff);
  text-align: center;
}
#game {
  margin: 50px auto;
  width: 80%;
  max-width: 500px;
  padding: 20px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff6f91;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background: #ff3f6c;
}
</style>
</head>
<body>

<div id="game">
  <h2 id="title">男子を選んでください</h2>
  <div id="choices"></div>
</div>

<script>
const game = document.getElementById("game");
const title = document.getElementById("title");
const choices = document.getElementById("choices");

let selectedBoy = "";
let lovePoint = 0;

function showChoices(options) {
  choices.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt.text;
    btn.onclick = opt.action;
    choices.appendChild(btn);
  });
}

function selectBoy(name) {
  selectedBoy = name;
  title.textContent = name + "と帰り道！どうする？";
  showChoices([
    { text: "一緒に帰ろうと誘う", action: () => nextScene(2) },
    { text: "何も言わない", action: () => nextScene(0) }
  ]);
}

function nextScene(point) {
  lovePoint += point;
  title.textContent = selectedBoy + "と会話中...";
  showChoices([
    { text: "面白い話をする", action: () => ending(2) },
    { text: "静かにする", action: () => ending(0) }
  ]);
}

function ending(point) {
  lovePoint += point;
  choices.innerHTML = "";

  if (lovePoint >= 3) {
    title.textContent = "ハッピーエンド！" + selectedBoy + "と仲良くなった！";
  } else {
    title.textContent = "バッドエンド...距離が縮まらなかった";
  }

  const retry = document.createElement("button");
  retry.textContent = "もう一度";
  retry.onclick = startGame;
  choices.appendChild(retry);
}

function startGame() {
  lovePoint = 0;
  selectedBoy = "";
  title.textContent = "男子を選んでください";
  showChoices([
    { text: "優しい男子", action: () => selectBoy("優しい男子") },
    { text: "クール男子", action: () => selectBoy("クール男子") },
    { text: "元気男子", action: () => selectBoy("元気男子") }
  ]);
}

startGame();
</script>

</body>
</html>
