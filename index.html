<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛ゲーム</title>
<style>
body {
  font-family: sans-serif;
  background: linear-gradient(#ffd1dc, #fff);
  text-align: center;
}
#game {
  margin: 50px auto;
  width: 90%;
  max-width: 520px;
  padding: 20px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.face {
  font-size: 80px;
  margin: 10px;
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff6f91;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
button:hover {
  background: #ff3f6c;
}
</style>
</head>
<body>

<div id="game">
  <h2 id="title">男子を選んでください</h2>
  <div id="face" class="face"></div>
  <div id="choices"></div>
</div>

<script>
const title = document.getElementById("title");
const choices = document.getElementById("choices");
const face = document.getElementById("face");

let selectedBoy = "";
let lovePoint = 0;
let stage = 1;

const faces = {
  "優しい男子": "👓😊",
  "クール男子": "😎🖤",
  "元気男子": "☀️😆"
};

function showChoices(options) {
  choices.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt.text;
    btn.onclick = opt.action;
    choices.appendChild(btn);
  });
}

function selectBoy(name) {
  selectedBoy = name;
  face.textContent = faces[name];
  title.textContent = name + "と帰り道！どうする？";
  showChoices([
    { text: "一緒に帰ろうと誘う", action: () => scene2(2) },
    { text: "軽くあいさつする", action: () => scene2(1) }
  ]);
}

function scene2(point) {
  lovePoint += point;
  title.textContent = selectedBoy + "と会話中！何を話す？";
  showChoices([
    { text: "学校の話", action: () => scene3(2) },
    { text: "趣味の話", action: () => scene3(3) },
    { text: "何も話さない", action: () => scene3(0) }
  ]);
}

function scene3(point) {
  lovePoint += point;
  title.textContent = selectedBoy + "が笑っている！どうする？";
  showChoices([
    { text: "一緒に笑う", action: () => ending(2) },
    { text: "照れる", action: () => ending(1) }
  ]);
}

function ending(point) {
  lovePoint += point;
  choices.innerHTML = "";

  if (lovePoint >= 5) {
    title.textContent = "ハッピーエンド！" + selectedBoy + "ともっと仲良くなった！";
    const next = document.createElement("button");
    next.textContent = "次のステージへ";
    next.onclick = nextStage;
    choices.appendChild(next);
  } else {
    title.textContent = "バッドエンド...距離が縮まらなかった";
    const retry = document.createElement("button");
    retry.textContent = "もう一度";
    retry.onclick = startGame;
    choices.appendChild(retry);
  }
}

function nextStage() {
  stage++;
  lovePoint = 0;
  title.textContent = "ステージ" + stage + "：デート編！どこに行く？";
  showChoices([
    { text: "カフェ", action: () => ending2(2) },
    { text: "映画", action: () => ending2(3) },
    { text: "公園", action: () => ending2(1) }
  ]);
}

function ending2(point) {
  lovePoint += point;
  choices.innerHTML = "";

  if (lovePoint >= 2) {
    title.textContent = "デート成功！完全ハッピーエンド✨";
  } else {
    title.textContent = "デート失敗...微妙な雰囲気に";
  }

  const retry = document.createElement("button");
  retry.textContent = "最初から";
  retry.onclick = startGame;
  choices.appendChild(retry);
}

function startGame() {
  lovePoint = 0;
  stage = 1;
  selectedBoy = "";
  face.textContent = "";
  title.textContent = "男子を選んでください";
  showChoices([
    { text: "優しい男子（メガネ先輩）", action: () => selectBoy("優しい男子") },
    { text: "クール男子（センター分け）", action: () => selectBoy("クール男子") },
    { text: "元気男子（色黒・短髪）", action: () => selectBoy("元気男子") }
  ]);
}

startGame();
</script>

</body>
</html>
