<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>恋愛ゲーム</title>
<style>
body {
  font-family: sans-serif;
  background: linear-gradient(#ffd1dc, #fff);
  text-align: center;
}
#game {
  margin: 30px auto;
  width: 90%;
  max-width: 520px;
  padding: 20px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
.face {
  font-size: 70px;
  margin: 10px;
}
#bar {
  width: 100%;
  height: 20px;
  background: #eee;
  border-radius: 10px;
  margin: 10px 0;
}
#fill {
  height: 100%;
  width: 0%;
  background: #ff6f91;
  border-radius: 10px;
}
button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff6f91;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="game">
  <h2 id="title">男子を選んでください</h2>
  <div id="face" class="face"></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="choices"></div>
</div>

<script>
const title = document.getElementById("title");
const choices = document.getElementById("choices");
const face = document.getElementById("face");
const fill = document.getElementById("fill");

let selectedBoy = "";
let lovePoint = 0;

const characters = {
  "優しい男子": {
    face: "👓🙂",
    lines: [
      "無理しないでね、一緒に帰ろうか",
      "今日どうだった？",
      "君と話すと落ち着くよ"
    ]
  },
  "クール男子": {
    face: "😎✨",
    lines: [
      "…帰るの？一緒に行く？",
      "別に嫌じゃない",
      "まぁ、楽しいかもな"
    ]
  },
  "元気男子": {
    face: "😆☀️",
    lines: [
      "よっ！一緒に帰ろうぜ！",
      "今日めっちゃ楽しかったな！",
      "もっと話そうぜ！"
    ]
  }
};

function updateBar() {
  fill.style.width = Math.min(lovePoint * 10, 100) + "%";
}

function showChoices(options) {
  choices.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt.text;
    btn.onclick = opt.action;
    choices.appendChild(btn);
  });
}

function selectBoy(name) {
  selectedBoy = name;
  face.textContent = characters[name].face;
  title.textContent = characters[name].lines[0];
  showChoices([
    { text: "誘う", action: () => scene2(2) },
    { text: "様子を見る", action: () => scene2(1) }
  ]);
}

function scene2(point) {
  lovePoint += point;
  updateBar();
  title.textContent = characters[selectedBoy].lines[1];
  showChoices([
    { text: "たくさん話す", action: () => scene3(3) },
    { text: "軽く話す", action: () => scene3(1) },
    { text: "黙る", action: () => scene3(0) }
  ]);
}

function scene3(point) {
  lovePoint += point;
  updateBar();
  title.textContent = characters[selectedBoy].lines[2];
  showChoices([
    { text: "笑う", action: () => scene4(2) },
    { text: "照れる", action: () => scene4(1) }
  ]);
}

function scene4(point) {
  lovePoint += point;
  updateBar();
  title.textContent = "放課後、もう少し一緒にいる？";
  showChoices([
    { text: "寄り道する", action: () => ending(3) },
    { text: "帰る", action: () => ending(0) }
  ]);
}

function ending(point) {
  lovePoint += point;
  updateBar();
  choices.innerHTML = "";

  if (lovePoint >= 8) {
    title.textContent = "ハッピーエンド！恋が進展した！次のステージへ✨";
    const next = document.createElement("button");
    next.textContent = "デート編へ";
    next.onclick = nextStage;
    choices.appendChild(next);
  } else {
    title.textContent = "バッドエンド…距離が縮まらなかった";
    const retry = document.createElement("button");
    retry.textContent = "もう一度";
    retry.onclick = startGame;
    choices.appendChild(retry);
  }
}

function nextStage() {
  lovePoint = 0;
  updateBar();
  title.textContent = "デート！どこ行く？";
  showChoices([
    { text: "カフェ", action: () => ending2(3) },
    { text: "映画", action: () => ending2(2) },
    { text: "公園", action: () => ending2(1) }
  ]);
}

function ending2(point) {
  lovePoint += point;
  updateBar();
  choices.innerHTML = "";

  if (lovePoint >= 2) {
    title.textContent = "最高のデート！完全ハッピーエンド💖";
  } else {
    title.textContent = "微妙なデートになってしまった…";
  }

  const retry = document.createElement("button");
  retry.textContent = "最初から";
  retry.onclick = startGame;
  choices.appendChild(retry);
}

function startGame() {
  lovePoint = 0;
  updateBar();
  face.textContent = "";
  title.textContent = "男子を選んでください";
  showChoices([
    { text: "優しい男子（メガネ先輩）", action: () => selectBoy("優しい男子") },
    { text: "クール男子（センター分け）", action: () => selectBoy("クール男子") },
    { text: "元気男子（色黒・短髪）", action: () => selectBoy("元気男子") }
  ]);
}

startGame();
</script>

</body>
</html>
